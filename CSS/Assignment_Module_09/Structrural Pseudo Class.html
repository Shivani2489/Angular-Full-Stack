<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structural Pseudo-Class</title>
    <style>
       ul :first-child{color: rgb(9, 9, 9);}
       ul:nth-child(even){color: rgb(32, 124, 237);}
       ul:nth-child(odd){color: rgb(69, 243, 0);}
    </style>
</head>
<body>
    <ul>
        <li>101</li>
        <li>Raj</li>
        <li>12th</li>
        <li>70%</li>
        <li>1234567890</li>
    </ul>
    <ul>
        <li>102</li>
        <li>Mayuri</li>
        <li>BCA</li>
        <li>59%</li>
        <li>6589345687</li>
    </ul>
    <ul>
        <li>103</li>
        <li>Ganesh</li>
        <li>BTech</li>
        <li>74%</li>
        <li>8456131654</li>
    </ul>
    <ul>
        <li>104</li>
        <li>Sarfraj</li>
        <li>BA</li>
        <li>80%</li>
        <li>9876543210</li>
    </ul>
</body>
</html>
